<!--首页，展示无人机列表、登录注册入口-->
<!DOCTYPE html>
<html lang="zh-CN"><!--定义文档语言为中文-->
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>无人机信息管理系统</title>
  <!-- Bootstrap CSS 样式框架 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Vue 应用挂载点 -->
  <div id="app"></div><!--整个页面内容都会挂载到这里 - 相当于前端的“容器”-->
  <!-- Vue 3 核心库 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script><!--引入 Vue 3 核心库，用于创建 Vue 实例和管理状态-->
  <!-- Axios HTTP 请求库 -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script><!--引入 Axios HTTP 请求库，（获取无人机数据、登录、增删改查）-->
  <!-- 应用主逻辑脚本 -->
  <script src="js/app.js"></script>
</body>
</html>
